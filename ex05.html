<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5. Sistema de Pontuação</title>

    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="assets/ex05.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>

    <main>
        <h1>5. Sistema de Pontuação</h1>

        <div class="score-box">
            <p>Pontuação Atual</p>
            <h2 id="pontos">0 XP</h2>
        </div>

        <div class="botoes">
            <button onclick="adicionarXP()">+10 XP</button>
            <button onclick="removerXP()">-5 XP</button>
        </div>

        <a href="index.html" class="btn-voltar">
            <i class='bx bx-left-arrow-alt'></i> Voltar
        </a>
    </main>

    <script>
        let pontos = 0;

        function atualizarTela() {
            document.getElementById("pontos").innerText = pontos + " XP";
        }

        function adicionarXP() {
            pontos += 10;
            atualizarTela();
        }

        function removerXP() {
            pontos -= 5;
            atualizarTela();
        }
    </script>

</body>

</html>
