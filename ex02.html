<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2. Card de Heróis</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="assets/ex02.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

<main>
    <h1>2. Cards de Heróis</h1>

    <section class="cards">

        <div class="game-card">
            <h2>Homem de Ferro</h2>
            <span class="tipo">Herói - Tecnologia</span>

            <img src="assets/img/tonystark.jpg">

            <div class="status">
                <p>Vida</p>
                <div class="barra"><div class="vida tony"></div></div>

                <p>Poder</p>
                <div class="barra"><div class="poder tony"></div></div>
            </div>
        </div>

        <div class="game-card">
            <h2>Homem Aranha</h2>
            <span class="tipo">Herói - Ágil</span>

            <img src="assets/img/homemaranha.jpg">

            <div class="status">
                <p>Vida</p>
                <div class="barra"><div class="vida aranha"></div></div>

                <p>Poder</p>
                <div class="barra"><div class="poder aranha"></div></div>
            </div>
        </div>

        <!-- Batman -->
        <div class="game-card">
            <h2>Batman</h2>
            <span class="tipo">Herói - Estratégico</span>

            <img src="assets/img/batman.webp">

            <div class="status">
                <p>Vida</p>
                <div class="barra"><div class="vida batman"></div></div>

                <p>Poder</p>
                <div class="barra"><div class="poder batman"></div></div>
            </div>
        </div>

    </section>

    <a href="index.html" class="btn-voltar"><i class='bx bx-left-arrow-alt'></i> Voltar</a>

</main>

</body>
</html>
