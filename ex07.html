<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7. Troca de Tema</title>

    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="assets/ex07.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body class="dark">

    <main>
        <h1>7. Troca de Tema</h1>

        <p class="texto">
            Clique no botão para alternar entre modo claro e escuro.
        </p>

        <button onclick="trocarTema()" class="btn-tema" id="btnTema">
            <i class='bx bx-moon'></i> Modo Claro
        </button>



        <a href="index.html" class="btn-voltar">
            <i class='bx bx-left-arrow-alt'></i> Voltar
        </a>
    </main>

    <script>
        function atualizarBotao() {
            const btn = document.getElementById("btnTema");

            if (document.body.classList.contains("light")) {
                btn.innerHTML = "<i class='bx bx-sun'></i> Modo Escuto";
            } else {
                btn.innerHTML = "<i class='bx bx-moon'></i> Modo Claro";
            }
        }

        function trocarTema() {
            document.body.classList.toggle("light");

            if (document.body.classList.contains("light")) {
                localStorage.setItem("tema", "light");
            } else {
                localStorage.setItem("tema", "dark");
            }

            atualizarBotao();
        }

        window.onload = () => {
            const tema = localStorage.getItem("tema");

            if (tema === "light") {
                document.body.classList.add("light");
            }

            atualizarBotao();
        };
    </script>

</body>

</html>
